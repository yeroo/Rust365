name: build-binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write       # create release + upload assets
      id-token: write        # keyless provenance + cosign signing
      attestations: write    # build-provenance attestation
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin: rust365
            asset: rust365-linux-x86_64
          - os: windows-latest
            bin: rust365.exe
            asset: rust365-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: cargo build --release

      - name: Stage binary + checksum
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.bin }}" "dist/${{ matrix.asset }}"
          cd dist
          sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          cat "${{ matrix.asset }}.sha256"

      - name: Attest build provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/${{ matrix.asset }}

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@v3

      - name: Sign artifact (keyless)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob --yes \
            --output-signature "dist/${{ matrix.asset }}.sig" \
            --output-certificate "dist/${{ matrix.asset }}.pem" \
            "dist/${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256
            dist/${{ matrix.asset }}.sig
            dist/${{ matrix.asset }}.pem
